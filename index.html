<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#EE4D2D">
<title>TOMS Kalkulator Shopee Seller 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:linear-gradient(135deg,#FFF5F3,#FFF0EE);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.lc{background:#fff;border-radius:24px;padding:32px 22px;max-width:400px;width:100%;box-shadow:0 12px 48px rgba(238,77,45,.15);text-align:center}
.ll{width:80px;height:80px;background:linear-gradient(135deg,#EE4D2D,#FF6B47);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px}
.lt{font-size:22px;font-weight:800;color:#111;margin-bottom:4px}
.ls{font-size:13px;color:#6B7280;margin-bottom:16px;line-height:1.5}
.em{display:none;background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px;text-align:left}
.succ{display:none;background:#F0FDF4;border:1px solid #86EFAC;color:#166534;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:12px}
.fl{font-size:11px;font-weight:700;color:#6B7280;text-align:left;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.pi{width:100%;padding:13px 15px;background:#F9FAFB;border:2px solid #E5E7EB;border-radius:12px;font-size:16px;font-family:inherit;color:#111;outline:none;margin-bottom:12px;-webkit-appearance:none}
.pi:focus{border-color:#EE4D2D;background:#fff}
.lb2{width:100%;padding:15px;background:linear-gradient(135deg,#EE4D2D,#FF6B47);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:800;cursor:pointer;-webkit-appearance:none;font-family:inherit;margin-top:4px}
.lb2:disabled{opacity:.6}
.ht{font-size:11px;color:#9CA3AF;margin-top:16px;line-height:1.7;border-top:1px solid #F3F4F6;padding-top:14px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:shake .3s ease}
#ac{display:none;position:fixed;inset:0;overflow:auto;-webkit-overflow-scrolling:touch}
</style>
</head>

  <input type="text" class="pi" id="ci" placeholder="Kode dari penjual" autocomplete="off" autocorrect="off" autocapitalize="characters" maxlength="8">
  <button class="lb2" id="lb2" type="button">&#128275; Buka Kalkulator</button>
  <div class="ht">Kode dikirim penjual setelah konfirmasi bayar<br><strong>&#169; 2026 TOMS Tools</strong></div>
</div>

<script>
// Secret key as char codes
var _k=[84,79,77,83,55,55,88,57,75,50,83,69,67,82,69,84];
var _s=_k.map(function(c){return String.fromCharCode(c);}).join("");

// Simple synchronous hash - works on ALL browsers, no async needed
function simpleHash(str){
  var h1=0xDEADBEEF,h2=0x41C6243A;
  for(var i=0;i<str.length;i++){
    var ch=str.charCodeAt(i);
    h1=Math.imul(h1^ch,0x9E3779B9);
    h2=Math.imul(h2^ch,0x243F6A88);
  }
  h1=Math.imul(h1^(h1>>>16),0x85EBCA6B);
  h1=Math.imul(h1^(h1>>>13),0xC2B2AE35);
  h1^=h1>>>16;
  h2=Math.imul(h2^(h2>>>16),0x85EBCA6B);
  h2=Math.imul(h2^(h2>>>13),0xC2B2AE35);
  h2^=h2>>>16;
  var u1=(h1>>>0).toString(16).padStart(8,"0").toUpperCase();
  var u2=(h2>>>0).toString(16).padStart(8,"0").toUpperCase();
  return u1+u2; // 16 char hex
}

function makeCode(name){
  var clean=name.toUpperCase().replace(/[^A-Z0-9]/g,"");
  var combined=_s+":"+clean;
  var full=simpleHash(combined);
  return full.substring(0,8); // first 8 chars
}

// Auto-uppercase code input
document.getElementById("ci").addEventListener("input",function(){
  this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,"").substring(0,8);
});

document.getElementById("lb2").addEventListener("click",check);
document.getElementById("ni").addEventListener("keydown",function(e){if(e.key==="Enter")document.getElementById("ci").focus();});
document.getElementById("ci").addEventListener("keydown",function(e){if(e.key==="Enter")check();});
setTimeout(function(){document.getElementById("ni").focus();},300);

function check(){
  var name=document.getElementById("ni").value.trim();
  var code=document.getElementById("ci").value.trim().toUpperCase().replace(/[^A-Z0-9]/g,"");
  if(!name){showErr("Isi nama kamu dulu");shake();return;}
  if(code.length<8){showErr("Kode akses harus 8 karakter");shake();return;}
  var expected=makeCode(name);
  if(code===expected){
    showSucc("Terverifikasi! Membuka kalkulator...");
    document.getElementById("lb2").style.background="#00C853";
    document.getElementById("lb2").disabled=true;
    setTimeout(loadApp,700);
  } else {
    showErr("Nama atau kode salah. Pastikan nama sama persis dengan yang diberikan ke penjual.");
    shake();
  }
}
function showErr(msg){
  document.getElementById("succ").style.display="none";
  var em=document.getElementById("em");em.textContent=msg;em.style.display="block";
}
function showSucc(msg){
  document.getElementById("em").style.display="none";
  var su=document.getElementById("succ");su.textContent=msg;su.style.display="block";
}
function shake(){
  var c=document.getElementById("lc");
  c.classList.remove("shake");void c.offsetWidth;c.classList.add("shake");
}
function loadApp(){
  document.getElementById("lc").style.display="none";
  document.body.style.cssText="margin:0;padding:0;background:#F0F2F5;display:block";
  var ac=document.getElementById("ac");
  ac.style.display="block";
  try{
    var bin=atob(B64);
    var bytes=new Uint8Array(bin.length);
    for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
    var decoded=new TextDecoder("utf-8").decode(bytes);
    var parser=new DOMParser();
    var doc=parser.parseFromString(decoded,"text/html");
    doc.querySelectorAll("style").forEach(function(s){
      var ns=document.createElement("style");ns.textContent=s.textContent;document.head.appendChild(ns);
    });
    ac.innerHTML=doc.body.innerHTML;
    ac.querySelectorAll("script").forEach(function(old){
      var ns=document.createElement("script");ns.textContent=old.textContent;document.body.appendChild(ns);old.remove();
    });
  }catch(e){
    ac.innerHTML="<p style='padding:20px;color:red'>Error loading app: "+e+"</p>";
  }
}
